<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/card-page.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <title>BlahBlah</title>
  </head>
  <body>
    <div class="title-bar">
      <img class="logo" src="/blahblah/blahblah_logo.png" />
      <div class="blahblah-container">
        <h1 class="blahblah">BlahBlah</h1>
      </div>
    </div>
    <h2 id="question"></h2>
<div class="swiper-container-wrapper">
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        
      </div>
      <div class="swiper-slide">Card 2</div>
      <div class="swiper-slide">Card 3</div>
    </div>
  </div>


  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>
    <script src="js/serve_questions_fr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
const swiper = new Swiper(".mySwiper", {
  slidesPerView: 1,
  spaceBetween: 20,
  centeredSlides: true,
  grabCursor: true,
  navigation: {
    nextEl: ".swiper-button-next",
    prevEl: ".swiper-button-prev",
  },
});
    </script>
  </body>
</html>
